<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Chat&Go — Join the Beta</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0396FF" />
<link rel="icon" href="assets/icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<style>
  :root {
    --blue: #0396FF;
    --blue-dark: #0270CC;
    --purple: #AB82FF;
    --purple-dark: #8B5CF6;
    --ink: #1a2232;
    --ink-soft: #4b5563;
    --ink-muted: #6b7280;
    --line: rgba(15, 23, 42, 0.08);
    --card: rgba(255, 255, 255, 0.95);
    --card-border: rgba(255, 255, 255, 0.35);
    --shadow-card: 0 12px 40px rgba(11, 33, 74, 0.10);
    --shadow-btn: 0 8px 24px rgba(3, 150, 255, 0.35);
    --radius-lg: 32px;
    --radius-md: 20px;
    --radius-sm: 14px;
    --sans: 'Roboto', 'Helvetica Neue', Arial, system-ui, sans-serif;
    --display: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: #0396FF;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ---------- Animated background layer ---------- */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 0% 0%, #AB82FF 0%, transparent 60%),
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.22) 0%, transparent 42%),
      radial-gradient(circle at 85% 85%, rgba(255,255,255,0.22) 0%, transparent 45%),
      #0396FF;
    will-change: background;
  }

  /* ---------- Nav ---------- */
  .nav {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.72);
    border-bottom: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 2px 20px rgba(11, 33, 74, 0.05);
  }
  .nav-inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .brand img { width: 36px; height: 36px; border-radius: 8px; box-shadow: 0 4px 12px rgba(3,150,255,0.25); }
  .brand-name {
    font-family: var(--display);
    font-weight: 700; font-size: 20px; letter-spacing: -0.3px;
    background: linear-gradient(135deg, #0396FF, #8B5CF6);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .nav-links { display: flex; gap: 28px; align-items: center; }
  .nav-links a {
    color: var(--ink-soft); text-decoration: none; font-size: 14px; font-weight: 500;
    transition: color .2s, border-color .2s, background .2s;
    padding: 8px 14px;
    border-radius: 12px;
    border: 1.5px solid rgba(3, 150, 255, 0.38);
    background: transparent;
  }
  .nav-links a:hover { color: var(--blue); border-color: rgba(3, 150, 255, 0.72); background: rgba(3, 150, 255, 0.06); }
  .nav-cta {
    background: linear-gradient(135deg, #0396FF, #0270CC);
    color: white; border: none; padding: 10px 18px; border-radius: 12px;
    font-weight: 600; font-size: 14px; cursor: pointer;
    box-shadow: 0 6px 16px rgba(3,150,255,0.35);
    transition: transform .2s, box-shadow .2s;
    font-family: var(--sans);
  }
  .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(3,150,255,0.42); }

  /* ---------- Hero ---------- */
  .hero {
    max-width: 1180px; margin: 0 auto;
    padding: 72px 24px 40px;
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 56px;
    align-items: center;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px 6px 8px;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 999px;
    font-size: 12.5px; font-weight: 600; color: var(--blue-dark);
    letter-spacing: 0.2px;
    box-shadow: 0 4px 14px rgba(11,33,74,0.08);
  }
  .badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; box-shadow: 0 0 0 4px rgba(16,185,129,0.18); animation: blink 1.8s infinite; }
  @keyframes blink { 50% { opacity: .55; } }

  .hero h1 {
    font-family: var(--display);
    font-size: clamp(40px, 5.2vw, 64px);
    line-height: 1.04;
    letter-spacing: -1.2px;
    color: #fff;
    margin: 18px 0 18px;
    font-weight: 800;
    text-shadow: 0 6px 30px rgba(4, 36, 80, 0.25);
    text-wrap: pretty;
  }
  .hero h1 .accent {
    display: inline-block;
    background: linear-gradient(180deg, #fff 0%, #e7f3ff 100%);
    -webkit-background-clip: text; background-clip: text;
  }
  .hero p.sub {
    color: rgba(255,255,255,0.92);
    font-size: 18px; line-height: 1.55; max-width: 540px; margin: 0 0 28px;
    text-shadow: 0 2px 10px rgba(4,36,80,0.15);
  }
  .hero-meta {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 20px;
    color: rgba(255,255,255,0.95); font-size: 14px;
  }
  .hero-meta .stack { display: flex; }
  .hero-meta .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.9); margin-left: -8px;
    display:flex; align-items:center; justify-content:center;
    font-size: 12px; font-weight: 700; color:#fff;
  }
  .hero-meta .avatar:first-child { margin-left: 0; }

  /* ---------- Signup Card ---------- */
  .signup-card {
    background: var(--card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: var(--radius-lg);
    border: 1px solid var(--card-border);
    box-shadow: var(--shadow-card);
    padding: 32px;
    position: relative;
    overflow: hidden;
  }
  .signup-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 100% 0%, rgba(171,130,255,0.16) 0%, transparent 50%);
    pointer-events: none;
  }
  .signup-head { display:flex; align-items:center; gap:12px; margin-bottom: 18px; }
  .signup-head .icon-wrap {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #0396FF, #AB82FF);
    display:flex; align-items:center; justify-content:center; color:#fff;
    box-shadow: 0 8px 20px rgba(3,150,255,0.35);
    flex-shrink: 0;
  }
  .signup-head h2 {
    font-family: var(--display);
    font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.3px;
  }
  .signup-head p { margin: 2px 0 0; color: var(--ink-muted); font-size: 13.5px; }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field label { font-size: 12.5px; font-weight: 600; color: var(--ink-soft); letter-spacing: 0.2px; }
  .input-wrap {
    position: relative;
    display: flex; align-items: center;
    background: #fff;
    border: 1.5px solid rgba(15,23,42,0.1);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-wrap:focus-within {
    border-color: var(--blue);
    box-shadow: 0 0 0 4px rgba(3,150,255,0.12);
  }
  .input-wrap .material-icons-round { color: var(--blue); font-size: 20px; margin-right: 8px; }
  .input-wrap input, .input-wrap select {
    flex: 1; border: 0; outline: 0; padding: 13px 0;
    font-size: 15px; font-family: var(--sans); color: var(--ink); background: transparent;
  }
  .input-wrap select { appearance: none; background: transparent; padding-right: 24px; cursor: pointer; }
  .input-wrap.has-select::after {
    content: 'expand_more';
    font-family: 'Material Icons Round';
    position: absolute; right: 10px; color: var(--ink-muted); pointer-events: none;
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 12px; border-radius: 999px;
    background: #f3f6fb;
    border: 1.5px solid transparent;
    color: var(--ink-soft);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all .2s;
    user-select: none;
  }
  .chip:hover { background: #e8f1fb; }
  .chip.on {
    background: linear-gradient(135deg, rgba(3,150,255,0.12), rgba(171,130,255,0.12));
    border-color: rgba(3,150,255,0.4);
    color: var(--blue-dark);
  }
  .chip .material-icons-round { font-size: 15px; }

  .check-row {
    display:flex; gap: 10px; align-items: flex-start;
    padding: 10px 0 4px;
    font-size: 12.5px; color: var(--ink-muted); line-height: 1.5;
    cursor: pointer;
  }
  .check-row input { margin-top: 3px; accent-color: var(--blue); }
  .check-row a { color: var(--blue-dark); font-weight: 500; }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, #0396FF, #0270CC);
    color: white; border: none;
    padding: 15px 20px;
    border-radius: var(--radius-sm);
    font-weight: 600; font-size: 15.5px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: var(--shadow-btn);
    transition: transform .18s, box-shadow .18s;
    font-family: var(--sans);
    margin-top: 4px;
  }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(3,150,255,0.45); }
  .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
  .btn-primary .material-icons-round { font-size: 20px; }

  .error-msg {
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
    color: #dc2626; font-size: 13px; padding: 10px 14px; border-radius: 10px;
    margin-bottom: 12px;
  }

  .footer-note { font-size: 11.5px; color: var(--ink-muted); text-align: center; margin-top: 12px; }

  .success-state { text-align: center; padding: 12px 0 4px; }
  .success-state .check-ring {
    width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 14px;
    background: linear-gradient(135deg, rgba(16,185,129,0.14), rgba(16,185,129,0.06));
    display:flex; align-items:center; justify-content:center;
    border: 2px solid rgba(16,185,129,0.35);
  }
  .success-state .check-ring .material-icons-round { color: #059669; font-size: 36px; }
  .success-state h3 { font-family: var(--display); font-size: 22px; margin: 0 0 6px; letter-spacing: -0.3px; }
  .success-state p { color: var(--ink-muted); font-size: 14px; margin: 0 0 18px; }
  .queue-row {
    background: #f3f6fb; border-radius: 14px; padding: 14px 16px;
    display:flex; align-items:center; justify-content: space-between; gap: 12px;
    font-size: 13px; color: var(--ink-soft);
  }
  .queue-row strong { color: var(--ink); font-family: var(--display); font-size: 16px; }

  /* ---------- Feature cards ---------- */
  section.features {
    max-width: 1180px; margin: 40px auto 0; padding: 32px 24px;
  }
  .section-title {
    text-align: center; color: #fff;
    font-family: var(--display);
    font-size: clamp(28px, 3.2vw, 38px);
    font-weight: 800; letter-spacing: -0.6px;
    margin: 0 0 10px; text-shadow: 0 4px 20px rgba(4,36,80,0.2);
  }
  .section-sub {
    text-align:center; color: rgba(255,255,255,0.88); max-width: 620px;
    margin: 0 auto 36px; font-size: 16px; line-height: 1.55;
  }
  .feature-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
  }
  .feature {
    background: var(--card);
    backdrop-filter: blur(20px);
    border-radius: var(--radius-md);
    padding: 24px;
    border: 1px solid var(--card-border);
    box-shadow: var(--shadow-card);
    transition: transform .25s, box-shadow .25s;
  }
  .feature:hover { transform: translateY(-3px); box-shadow: 0 18px 50px rgba(11,33,74,0.14); }
  .feature .icon {
    width: 46px; height: 46px; border-radius: 12px;
    display:flex; align-items:center; justify-content:center;
    color: #fff; margin-bottom: 14px;
    box-shadow: 0 8px 18px rgba(3,150,255,0.25);
  }
  .feature .icon.i-1 { background: linear-gradient(135deg, #0396FF, #0270CC); }
  .feature .icon.i-2 { background: linear-gradient(135deg, #AB82FF, #8B5CF6); }
  .feature .icon.i-3 { background: linear-gradient(135deg, #0396FF, #AB82FF); }
  .feature h3 { font-family: var(--display); font-size: 18px; margin: 0 0 6px; letter-spacing: -0.2px; }
  .feature p { color: var(--ink-muted); font-size: 14px; line-height: 1.55; margin: 0; }

  /* ---------- Chat preview showcase ---------- */
  section.showcase {
    max-width: 1180px; margin: 48px auto 0; padding: 32px 24px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center;
  }
  .showcase .copy h2 {
    font-family: var(--display); color:#fff;
    font-size: clamp(26px, 3vw, 36px); letter-spacing:-0.6px; margin: 0 0 14px; font-weight: 800;
    text-shadow: 0 4px 20px rgba(4,36,80,0.2);
  }
  .showcase .copy p { color: rgba(255,255,255,0.9); font-size: 16px; line-height: 1.6; max-width: 480px; }
  .showcase ul { list-style: none; padding: 0; margin: 18px 0 0; display: grid; gap: 10px; }
  .showcase li {
    display:flex; align-items:center; gap:10px; color: #fff; font-size: 15px;
  }
  .showcase li .material-icons-round {
    background: rgba(255,255,255,0.95); color: var(--blue);
    width: 24px; height: 24px; border-radius: 50%;
    display:flex; align-items:center; justify-content:center; font-size: 16px;
    font-weight: 700;
  }

  /* ---------- Phone shell ---------- */
  .phone {
    width: 300px; height: 620px; margin: 0 auto;
    background: #181c2e;
    border-radius: 44px;
    padding: 10px;
    box-shadow: 0 40px 80px rgba(4, 14, 40, 0.50), 0 0 0 1px rgba(255,255,255,0.08);
    position: relative;
  }
  .phone::after {
    content:''; position:absolute; left: 50%; top: 10px; transform: translateX(-50%);
    width: 90px; height: 22px; background:#181c2e; border-radius: 12px; z-index: 5;
  }
  .screen {
    width: 100%; height: 100%; border-radius: 36px; overflow: hidden; position: relative;
    background: linear-gradient(160deg, #3a9ef5 0%, #9b72f5 100%);
    display: flex; flex-direction: column;
  }

  /* status bar */
  .screen .statusbar {
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 20px 6px;
    color:#fff; font-size: 11px; font-weight: 700; font-family: var(--display);
    flex-shrink: 0;
  }

  .typing {
    display:flex; gap:3px; padding: 8px 12px; background:#fff;
    border-radius:18px; border-bottom-left-radius:5px;
    box-shadow: 0 2px 10px rgba(11,33,74,0.08); border:1px solid #f0f2f7;
    align-self:flex-start; width:fit-content;
  }
  .typing span { width:5px; height:5px; border-radius:50%; background:#bcc4d0; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2){ animation-delay:.15s; }
  .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.4;} 40%{transform:translateY(-4px);opacity:1;} }

  /* ---------- Original chat screen styles (Showcase phone) ---------- */
  .screen .chat-head {
    display:flex; align-items:center; gap:10px;
    padding: 12px 16px; color:#fff;
    background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
    margin-top: 28px;
  }
  .screen .chat-head .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg,#FFD580,#FF9E6B);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight: 700; font-size: 14px; font-family: var(--display);
  }
  .screen .chat-head .name { font-weight: 600; font-size: 14.5px; font-family: var(--display); }
  .screen .chat-head .sub { font-size: 11.5px; opacity: .85; margin-top: 1px; display:flex; align-items:center; gap:4px; }
  .screen .chat-head .sub .material-icons-round { font-size: 12px; }
  .screen .chat-body {
    flex: 1; background: #f7f8fa; padding: 16px 14px; display:flex; flex-direction: column; gap: 10px; overflow: hidden;
  }
  .screen .msg {
    max-width: 76%; padding: 10px 13px; border-radius: 18px; font-size: 13px; line-height: 1.4;
  }
  .screen .msg .tr { font-size: 11.5px; margin-top: 4px; }
  .screen .msg.them {
    align-self: flex-start; background: #fff; color: var(--ink);
    border-bottom-left-radius: 6px; box-shadow: 0 2px 10px rgba(11,33,74,0.06);
  }
  .screen .msg.them .tr { color: var(--ink-muted); font-style: italic; }
  .screen .msg.me {
    align-self: flex-end;
    background: linear-gradient(135deg, #0396FF, #0270CC);
    color: #fff; border-bottom-right-radius: 6px;
  }
  .screen .msg.me .tr { color: rgba(255,255,255,0.85); }
  .lang-tag {
    font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 5px; margin-right: 6px;
    background: rgba(3,150,255,0.1); color: var(--blue-dark); display: inline-block;
  }
  .screen .msg.me .lang-tag { background: rgba(255,255,255,0.25); color: #fff; }
  .screen .input-bar {
    padding: 10px 12px 14px; background: #fff; display:flex; align-items:center; gap:8px;
    border-top: 1px solid var(--line);
  }
  .screen .input-bar .input-fake {
    flex: 1; height: 36px; border-radius: 18px; background: #f3f6fb;
    display:flex; align-items:center; padding: 0 14px; font-size: 12.5px; color: var(--ink-muted);
  }
  .screen .input-bar .send {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #0396FF, #AB82FF);
    display:flex; align-items:center; justify-content:center; color:#fff;
  }

  /* ---------- Learning Room section ---------- */
  section.learning-room {
    max-width: 1180px; margin: 64px auto 0; padding: 32px 24px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center;
  }
  section.learning-room .copy h2 {
    font-family: var(--display); color:#fff;
    font-size: clamp(26px, 3vw, 36px); letter-spacing:-0.6px; margin: 0 0 14px; font-weight: 800;
    text-shadow: 0 4px 20px rgba(4,36,80,0.2);
  }
  section.learning-room .copy p { color: rgba(255,255,255,0.9); font-size: 16px; line-height: 1.6; max-width: 480px; }
  section.learning-room ul { list-style: none; padding: 0; margin: 18px 0 0; display: grid; gap: 10px; }
  section.learning-room li { display:flex; align-items:center; gap:10px; color: #fff; font-size: 15px; }
  section.learning-room li .material-icons-round {
    background: rgba(255,255,255,0.95); color: #0396ff;
    width: 24px; height: 24px; border-radius: 50%;
    display:flex; align-items:center; justify-content:center; font-size: 16px; font-weight: 700;
  }

  /* Learning phone — AI tutor chat, matches the real app screenshot */
  .lr-phone .screen {
    background: linear-gradient(180deg, #4a9ff5 0%, #7a85f0 55%, #9b72f5 100%);
    padding: 0;
    display: flex; flex-direction: column;
    position: relative;
  }

  .lrchat-card {
    margin: 34px 12px 0;
    background: #fff;
    border-radius: 22px;
    box-shadow: 0 10px 28px rgba(4,14,40,0.18);
    display: flex; flex-direction: column;
    flex: 1; min-height: 0;
    overflow: hidden;
  }

  .lrchat-head {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    background: #fff;
  }
  .lrchat-logo {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, #3a9ef5 0%, #9b72f5 100%);
    display: flex; align-items: center; justify-content: center;
    color: #fff; flex-shrink: 0;
    border: 2px solid #fff;
    box-shadow: 0 2px 8px rgba(58,158,245,0.35);
  }
  .lrchat-logo .material-icons-round { font-size: 16px; }
  .lrchat-titles { flex: 1; min-width: 0; }
  .lrchat-lang { font-family: var(--display); font-weight: 700; font-size: 14px; color: var(--ink); line-height: 1.1; }
  .lrchat-online {
    font-size: 10.5px; color: #10b981; font-weight: 600;
    display: flex; align-items: center; gap: 4px; margin-top: 2px;
  }
  .lrchat-online::before { content:''; width:5px; height:5px; border-radius:50%; background:#10b981; }
  .lrchat-actions { display: flex; gap: 6px; align-items: center; }
  .lrchat-btn {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; flex-shrink: 0;
  }
  .lrchat-btn.orange {
    background: linear-gradient(135deg, #ffb347, #ff8c1a);

  }
  .mobile-menu-handle {
    width: 40px; height: 4px; background: #e2e8f0; border-radius: 2px;

  }
  .mobile-menu-sheet a {

    padding: 14px 4px; text-decoration: none;
    color: var(--ink); font-size: 17px; font-weight: 500;

  }

</style>

<body>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

const LANGUAGES = [
  { code: 'en', name: 'English', flag: '🇬🇧' },
  { code: 'es', name: 'Spanish', flag: '🇪🇸' },
  { code: 'fr', name: 'French', flag: '🇫🇷' },
  { code: 'de', name: 'German', flag: '🇩🇪' },
  { code: 'it', name: 'Italian', flag: '🇮🇹' },
  { code: 'pt', name: 'Portuguese', flag: '🇵🇹' },
  { code: 'ja', name: 'Japanese', flag: '🇯🇵' },
  { code: 'ko', name: 'Korean', flag: '🇰🇷' },
  { code: 'zh', name: 'Mandarin', flag: '🇨🇳' },
  { code: 'ar', name: 'Arabic', flag: '🇸🇦' },
  { code: 'hi', name: 'Hindi', flag: '🇮🇳' },
  { code: 'ru', name: 'Russian', flag: '🇷🇺' },
];

const PLATFORMS = [
  { id: 'ios', label: 'iOS', icon: 'phone_iphone' },
  { id: 'android', label: 'Android', icon: 'android' },
  { id: 'web', label: 'Web (PWA)', icon: 'language' },
];

const GOALS = [
  { id: 'learn', label: 'Learn a language', icon: 'school' },
  { id: 'travel', label: 'Travel', icon: 'flight_takeoff' },
  { id: 'friends', label: 'Chat with friends', icon: 'group' },
  { id: 'work', label: 'Work abroad', icon: 'work' },
];

function Brand() {
  return (
    <a href="#" className="brand">
      <img src="assets/logo2.png" alt="Chat&Go logo" />
      <span className="brand-name">Chat&amp;Go</span>
    </a>
  );
}

function Nav({ onJoinClick }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const close = () => setMenuOpen(false);
  const handleJoin = () => { close(); onJoinClick(); };

  return (
    <>
      <nav className="nav">
        <div className="nav-inner">
          <Brand />
          <div className="nav-links">
            <a href="#features">Features</a>
            <a href="#how">How it works</a>
            <a href="#faq">FAQ</a>
          </div>
          <button className="nav-cta" onClick={onJoinClick}>Join the beta</button>
          <button className="nav-menu-btn" onClick={() => setMenuOpen(true)} aria-label="Open menu">
            <span className="material-icons-round">menu</span>
          </button>
        </div>
      </nav>

      <div className={'mobile-menu ' + (menuOpen ? 'open' : '')} onClick={close}>
        <div className="mobile-menu-sheet" onClick={e => e.stopPropagation()}>
          <div className="mobile-menu-handle" />
          <a href="#features" onClick={close}>
            <span className="material-icons-round">translate</span>Features
          </a>
          <a href="#how" onClick={close}>
            <span className="material-icons-round">phone_iphone</span>How it works
          </a>
          <a href="#faq" onClick={close}>
            <span className="material-icons-round">help_outline</span>FAQ
          </a>
          <button className="mobile-menu-cta" onClick={handleJoin}>Join the beta</button>
        </div>
      </div>
    </>
  );
}

function HeroMeta({ count }) {
  const people = [
    { bg: 'linear-gradient(135deg,#FFD580,#FF9E6B)', i: 'A' },
    { bg: 'linear-gradient(135deg,#7FD9FF,#0396FF)', i: 'M' },
    { bg: 'linear-gradient(135deg,#C6B6FF,#8B5CF6)', i: 'Y' },
    { bg: 'linear-gradient(135deg,#9EE8C1,#10b981)', i: 'K' },
  ];
  return (
    <div className="hero-meta">
      <div className="stack">
        {people.map((p, i) => (
          <div key={i} className="avatar" style={{ background: p.bg }}>{p.i}</div>
        ))}
      </div>
      <span><strong style={{fontWeight:700}}>{count.toLocaleString()}</strong> already in the queue</span>
    </div>
  );
}

function SignupCard({ onSuccess }) {
  const [state, setState] = useState({
    name: '', email: '',
    nativeLang: 'en', learnLang: 'es',
    platforms: ['ios'],
    goals: ['learn'],
    agree: false,
  });
  const [submitted, setSubmitted] = useState(false);
  const [position, setPosition] = useState(0);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const toggle = (key, v) => setState(s => {
    const arr = s[key];
    return { ...s, [key]: arr.includes(v) ? arr.filter(x => x !== v) : [...arr, v] };
  });

  const canSubmit = state.name.trim().length > 1 && /.+@.+\..+/.test(state.email) && state.agree && !loading;

  const onSubmit = async (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    setLoading(true);
    setError('');
    try {
      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: state.name,
          email: state.email,
          nativeLang: state.nativeLang,
          learnLang: state.learnLang,
          platforms: state.platforms,
          goals: state.goals,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        setError(data.error || 'Something went wrong. Please try again.');
        return;
      }
      setPosition(data.position);
      setSubmitted(true);
      if (onSuccess) onSuccess(data.position);
    } catch {
      setError('Could not reach the server. Please try again.');
    } finally {
      setLoading(false);
    }
  };

  if (submitted) {
    return (
      <div className="signup-card">
        <div className="success-state">
          <div className="check-ring"><span className="material-icons-round">check</span></div>
          <h3>You're in, {state.name.split(' ')[0]}!</h3>
          <p>We'll email you at <strong>{state.email}</strong> as soon as your build is ready.</p>
        </div>
      </div>
    );
  }

  return (
    <form className="signup-card" onSubmit={onSubmit}>
      <div className="signup-head">
        <div className="icon-wrap"><span className="material-icons-round">rocket_launch</span></div>
        <div>
          <h2>Join the private beta</h2>
          <p>Free forever for early testers. No credit card.</p>
        </div>
      </div>

      {error && <div className="error-msg">{error}</div>}

      <div className="field">
        <label>Full name</label>
        <div className="input-wrap">
          <span className="material-icons-round">person</span>
          <input required placeholder="Alex Morgan" value={state.name}
                 onChange={e => setState(s => ({...s, name: e.target.value}))} />
        </div>
      </div>

      <div className="field">
        <label>Email address</label>
        <div className="input-wrap">
          <span className="material-icons-round">mail</span>
          <input required type="email" placeholder="you@domain.com" value={state.email}
                 onChange={e => setState(s => ({...s, email: e.target.value}))} />
        </div>
      </div>

      <div className="grid-2">
        <div className="field">
          <label>You speak</label>
          <div className="input-wrap has-select">
            <span className="material-icons-round">record_voice_over</span>
            <select value={state.nativeLang} onChange={e => setState(s => ({...s, nativeLang: e.target.value}))}>
              {LANGUAGES.map(l => <option key={l.code} value={l.code}>{l.flag} {l.name}</option>)}
            </select>
          </div>
        </div>
        <div className="field">
          <label>You want to learn</label>
          <div className="input-wrap has-select">
            <span className="material-icons-round">translate</span>
            <select value={state.learnLang} onChange={e => setState(s => ({...s, learnLang: e.target.value}))}>
              {LANGUAGES.map(l => <option key={l.code} value={l.code}>{l.flag} {l.name}</option>)}
            </select>
          </div>
        </div>
      </div>

      <div className="field">
        <label>Why you're joining</label>
        <div className="chip-row">
          {GOALS.map(g => (
            <div key={g.id}
                 className={'chip ' + (state.goals.includes(g.id) ? 'on' : '')}
                 onClick={() => toggle('goals', g.id)}>
              <span className="material-icons-round">{g.icon}</span>{g.label}
            </div>
          ))}
        </div>
      </div>

      <label className="check-row">
        <input type="checkbox" checked={state.agree} onChange={e => setState(s => ({...s, agree: e.target.checked}))} />
        <span>I agree to share crash &amp; usage data to help improve the beta, and to the <a href="#">terms</a> and <a href="#">privacy policy</a>.</span>
      </label>

      <button type="submit" className="btn-primary" disabled={!canSubmit}>
        <span className="material-icons-round">{loading ? 'hourglass_top' : 'send'}</span>
        {loading ? 'Submitting…' : 'Join the beta'}
      </button>
      <div className="footer-note">We review signups weekly. Invites are sent in batches.</div>
    </form>
  );
}

function Hero({ queueCount, setQueueCount }) {
  const scrollToForm = () => document.getElementById('signup')?.scrollIntoView({behavior:'smooth', block:'center'});
  return (
    <section className="hero">
      <div>
        <span className="badge"><span className="dot" />Private beta now open</span>
        <h1>
          Say it.<br/>
          <span className="accent">Translate it. Go.</span>
        </h1>
        <p className="sub">Real-time chat translation for 60+ languages. Invite your friends, pick a learning goal, and let Chat&amp;Go do the rest.</p>
        <HeroMeta count={queueCount} />
      </div>
      <div id="signup">
        <SignupCard onSuccess={(pos) => setQueueCount(pos)} />
      </div>
    </section>
  );
}

function Features() {
  const items = [
    { i: 'i-1', icon: 'translate', t: 'Real-time translation', d: '60+ languages, translated inline as you chat. Both sides see the message in their own language, instantly.' },
    { i: 'i-2', icon: 'school', t: 'Learn as you chat', d: 'Tap any phrase for grammar hints, pronunciation, and vocabulary cards that sync with your Learning Room.' },
    { i: 'i-3', icon: 'groups', t: 'Learning Rooms', d: 'Create group rooms with friends, set a target language, and track progress together with weekly insights.' },
  ];
  return (
    <section className="features" id="features">
      <h2 className="section-title">What early testers get</h2>
      <p className="section-sub">All core features of the Chat&amp;Go app, plus direct access to the team — your feedback shapes the v1 launch.</p>
      <div className="feature-grid">
        {items.map((f, i) => (
          <div key={i} className="feature">
            <div className={'icon ' + f.i}><span className="material-icons-round">{f.icon}</span></div>
            <h3>{f.t}</h3>
            <p>{f.d}</p>
          </div>
        ))}
      </div>
    </section>
  );
}

function Showcase() {
  return (
    <section className="showcase" id="how">
      <div className="copy">
        <h2>How Chat&amp;Go feels.</h2>
        <p>You write in your language, your friend reads in theirs. A learning tag appears every few messages so you start noticing patterns, not memorizing lists.</p>
        <ul>
          <li><span className="material-icons-round">check</span>Inline translation, on by default</li>
          <li><span className="material-icons-round">check</span>Tap a word for a mini-lesson</li>
          <li><span className="material-icons-round">check</span>Group rooms with shared goals</li>
          <li><span className="material-icons-round">check</span>Weekly insights &amp; streak tracking</li>
        </ul>
      </div>
      <div>
        <div className="phone">
          <div className="screen">
            <div className="statusbar"><span>9:41</span><span>●●●</span></div>
            <div className="chat-head">
              <div className="avatar">M</div>
              <div>
                <div className="name">María · Madrid</div>
                <div className="sub"><span className="material-icons-round">circle</span> Online · speaks Spanish</div>
              </div>
            </div>
            <div className="chat-body">
              <div className="msg them">
                <div><span className="lang-tag">ES</span>¡Hola! ¿Listo para el viaje?</div>
                <div className="tr">Hi! Ready for the trip?</div>
              </div>
              <div className="msg me">
                <div><span className="lang-tag">EN→ES</span>Almost — still packing!</div>
                <div className="tr">Casi — ¡todavía haciendo la maleta!</div>
              </div>
              <div className="msg them">
                <div><span className="lang-tag">ES</span>Vale, tranquilo. Nos vemos a las ocho.</div>
                <div className="tr">Okay, no rush. See you at eight.</div>
              </div>
              <div className="typing"><span/><span/><span/></div>
            </div>
            <div className="input-bar">
              <div className="input-fake">Write a message…</div>
              <div className="send"><span className="material-icons-round" style={{fontSize:18}}>send</span></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );

function App() {
  const [queueCount, setQueueCount] = useState(1284);
  const bgRef = React.useRef(null);
  const onJoin = () => document.getElementById('signup')?.scrollIntoView({behavior:'smooth', block:'center'});

  React.useEffect(() => {
    const ease = (t) => t * t * (3 - 2 * t); // smoothstep

    let ticking = false;
    const update = () => {
      ticking = false;
      const el = bgRef.current;
      if (!el) return;
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      const raw = maxScroll > 0 ? window.scrollY / maxScroll : 0;
      const p = ease(Math.max(0, Math.min(1, raw)));

      // Purple radial in upper-left fades out as you scroll
      const purpleOpacity = 1 - p;
      // White shimmer highlights fade slightly
      const shimmer = (0.22 - 0.10 * p).toFixed(3);

      el.style.background = [
        `radial-gradient(ellipse at 0% 0%, rgba(171,130,255,${purpleOpacity.toFixed(3)}) 0%, transparent 60%)`,
        `radial-gradient(circle at 15% 10%, rgba(255,255,255,${shimmer}) 0%, transparent 42%)`,
        `radial-gradient(circle at 85% 85%, rgba(255,255,255,${shimmer}) 0%, transparent 45%)`,
        '#0396FF',
      ].join(',');
    };

    const onScroll = () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(update);
    };

    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    update(); // initial paint
    return () => {
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', onScroll);
    };
  }, []);

  return (
    <>
      <div className="bg-layer" ref={bgRef} />
      <Nav onJoinClick={onJoin} />
      <Hero queueCount={queueCount} setQueueCount={setQueueCount} />
      <Features />
      <Showcase />
      <LearningRoom />
      <FAQ />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
